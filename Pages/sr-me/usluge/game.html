<!DOCTYPE html>
<html lang="sr-ME">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lane Dodge</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1117;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(to bottom, #171b24 0%, #0d1016 100%);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
      font-weight: 700;
      font-size: 18px;
    }

    .panel {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(6px);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    .card {
      width: min(92vw, 460px);
      padding: 28px;
      border-radius: 24px;
      background: #171b24;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: clamp(34px, 7vw, 54px);
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #d7dbe7;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      background: white;
      color: #111;
      font-weight: 800;
      padding: 14px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 8px;
    }

    .small {
      margin-top: 12px;
      font-size: 13px;
      color: #9ca3b5;
    }

    .touch {
      position: fixed;
      inset: 0;
      z-index: 4;
    }

    .zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      opacity: 0;
    }

    #leftZone { left: 0; }
    #rightZone { right: 0; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="panel">Score: <span id="score">0</span></div>
    <div class="panel">Best: <span id="best">0</span></div>
  </div>

  <div class="screen" id="startScreen">
    <div class="card">
      <h1>Lane Dodge</h1>
      <p>Pomjeraj blok lijevo i desno i izbjegavaj prepreke koje padaju.</p>
      <p><strong>Desktop:</strong> A/D ili ←/→</p>
      <p><strong>Telefon:</strong> tap lijeva ili desna polovina ekrana</p>
      <button class="btn" id="startBtn">Pokreni</button>
      <div class="small">Što duže preživiš, igra ide brže.</div>
    </div>
  </div>

  <div class="screen hidden" id="gameOverScreen">
    <div class="card">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <p id="finalBest">Best: 0</p>
      <button class="btn" id="restartBtn">Igraj opet</button>
      <div class="small">Space ili Enter takođe restartuju.</div>
    </div>
  </div>

  <div class="touch">
    <div class="zone" id="leftZone"></div>
    <div class="zone" id="rightZone"></div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const finalScoreEl = document.getElementById("finalScore");
    const finalBestEl = document.getElementById("finalBest");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leftZone = document.getElementById("leftZone");
    const rightZone = document.getElementById("rightZone");

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    const game = {
      running: false,
      over: false,
      score: 0,
      best: parseInt(localStorage.getItem("laneDodgeBest") || "0", 10),
      speed: 280,
      spawnTimer: 0,
      lastTime: 0,
      obstacles: []
    };

    bestEl.textContent = game.best;

    const player = {
      lane: 1,
      size: 42
    };

    function laneX(lane) {
      const w = window.innerWidth;
      return w * (0.25 + lane * 0.25);
    }

    function roadTop() {
      return 90;
    }

    function roadBottom() {
      return window.innerHeight - 60;
    }

    function resetGame() {
      game.running = true;
      game.over = false;
      game.score = 0;
      game.speed = 280;
      game.spawnTimer = 0.8;
      game.obstacles = [];
      player.lane = 1;
      scoreEl.textContent = "0";
      startScreen.classList.add("hidden");
      gameOverScreen.classList.add("hidden");
    }

    function moveLeft() {
      if (!game.running || game.over) return;
      player.lane = Math.max(0, player.lane - 1);
    }

    function moveRight() {
      if (!game.running || game.over) return;
      player.lane = Math.min(2, player.lane + 1);
    }

    function spawnObstacle() {
      const blockedLane = Math.floor(Math.random() * 3);
      game.obstacles.push({
        lane: blockedLane,
        y: -60,
        size: 40
      });
    }

    function endGame() {
      game.running = false;
      game.over = true;

      const final = Math.floor(game.score);
      if (final > game.best) {
        game.best = final;
        localStorage.setItem("laneDodgeBest", String(final));
      }

      bestEl.textContent = game.best;
      finalScoreEl.textContent = "Score: " + final;
      finalBestEl.textContent = "Best: " + game.best;
      gameOverScreen.classList.remove("hidden");
    }

    function update(dt) {
      if (!game.running || game.over) return;

      game.score += dt * 10;
      game.speed += dt * 8;
      game.spawnTimer -= dt;

      if (game.spawnTimer <= 0) {
        spawnObstacle();
        game.spawnTimer = Math.max(0.32, 0.82 - game.score * 0.003);
      }

      for (let i = game.obstacles.length - 1; i >= 0; i--) {
        const obs = game.obstacles[i];
        obs.y += game.speed * dt;

        if (obs.y > window.innerHeight + 80) {
          game.obstacles.splice(i, 1);
          continue;
        }

        const playerX = laneX(player.lane);
        const playerY = roadBottom();
        const sameLane = obs.lane === player.lane;

        if (
          sameLane &&
          obs.y + obs.size / 2 > playerY - player.size / 2 &&
          obs.y - obs.size / 2 < playerY + player.size / 2
        ) {
          endGame();
          return;
        }
      }

      scoreEl.textContent = Math.floor(game.score);
      bestEl.textContent = game.best;
    }

    function drawBackground() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      ctx.fillStyle = "#0f1117";
      ctx.fillRect(0, 0, w, h);

      const roadW = Math.min(420, w * 0.82);
      const x = (w - roadW) / 2;

      ctx.fillStyle = "#171b24";
      ctx.fillRect(x, roadTop(), roadW, h - roadTop());

      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, roadTop(), roadW, h - roadTop());

      const lane1 = x + roadW / 3;
      const lane2 = x + (roadW / 3) * 2;

      ctx.setLineDash([18, 16]);
      ctx.strokeStyle = "rgba(255,255,255,0.16)";
      ctx.beginPath();
      ctx.moveTo(lane1, roadTop());
      ctx.lineTo(lane1, h);
      ctx.moveTo(lane2, roadTop());
      ctx.lineTo(lane2, h);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPlayer() {
      const x = laneX(player.lane);
      const y = roadBottom();
      const s = player.size;

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(x - s / 2, y - s / 2, s, s);
    }

    function drawObstacles() {
      for (const obs of game.obstacles) {
        const x = laneX(obs.lane);
        const s = obs.size;

        ctx.fillStyle = "#ff5a5a";
        ctx.fillRect(x - s / 2, obs.y - s / 2, s, s);
      }
    }

    function render() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      drawBackground();
      drawObstacles();
      drawPlayer();
    }

    function loop(timestamp) {
      if (!game.lastTime) game.lastTime = timestamp;
      const dt = Math.min(0.033, (timestamp - game.lastTime) / 1000);
      game.lastTime = timestamp;

      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "a" || key === "arrowleft") moveLeft();
      if (key === "d" || key === "arrowright") moveRight();

      if ((key === "enter" || key === " ") && !game.running) {
        if (game.over) resetGame();
      }
    });

    leftZone.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveLeft();
    }, { passive: false });

    rightZone.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveRight();
    }, { passive: false });

    leftZone.addEventListener("mousedown", moveLeft);
    rightZone.addEventListener("mousedown", moveRight);

    startBtn.addEventListener("click", resetGame);
    restartBtn.addEventListener("click", resetGame);

    requestAnimationFrame(loop);
  </script>
</body>
</html>
